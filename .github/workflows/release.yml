name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if ! git merge-base --is-ancestor "$TAG" origin/main; then
            echo "Tag $TAG is not on origin/main. Aborting." >&2
            exit 1
          fi

      - name: Parse tag and detect prerelease
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$VERSION" =~ $SEMVER_RE ]]; then
            echo "Tag $TAG is not a valid SemVer. Aborting." >&2
            exit 1
          fi
          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commits
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" "$TAG^" 2>/dev/null || true)
          {
            echo "## ${TAG}"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since [\`${PREV_TAG}\`](../../compare/${PREV_TAG}...${TAG}):"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}"
            else
              echo "Initial release."
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${TAG}"
            fi
            echo
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          ARGS=(--title "$TAG" --notes-file RELEASE_NOTES.md)
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "${ARGS[@]}"
