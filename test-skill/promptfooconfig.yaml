# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "browser-cli skill — local 3-layer eval (L1 direct API, L2 page-bound JSON, L3 DOM)"

evaluateOptions:
  maxConcurrency: 1

providers:
  - id: anthropic:claude-agent-sdk
    config:
      working_dir: ./src
      apiKeyRequired: false
      permission_mode: bypassPermissions
      setting_sources: ["project"]
      append_allowed_tools: ["Skill", "Read", "Write", "Edit", "Bash"]
      allow_dangerously_skip_permissions: true

  - id: openai:codex-sdk
    config:
      model: "{{ env.CODEX_MODEL | default('gpt-5.4') }}"
      working_dir: ./src
      sandbox_mode: danger-full-access
      approval_policy: never
      network_access_enabled: true
      enable_streaming: true
      inherit_process_env: true
      cli_env:
        BROWSER_CLI_HOME: "{{ env.BROWSER_CLI_HOME_OVERRIDE | default('../browser-cli') }}"

extensions:
  - file://./extensions.cjs:default

prompts:
  - "{{prompt}}"

tests:
  - description: "L1 — direct API only"
    vars:
      baseUrl: "{{ env.TEST_SKILL_FIXTURE_BASE_URL | default('http://127.0.0.1:4173') }}"
      prompt: "browser-cli 帮我写一个 workflow，从 {{baseUrl}}/l1 获取前 5 条新闻，最终返回 JSON 数组，每项只包含 title 和 url。写完后运行一次，把运行结果贴在回复里。"
    assert:
      - type: skill-used
        value: browser-cli

      - type: javascript
        value: file://./assertions.cjs:evaluateL1

  - description: "L2 — page-bound JSON only"
    vars:
      baseUrl: "{{ env.TEST_SKILL_FIXTURE_BASE_URL | default('http://127.0.0.1:4173') }}"
      prompt: "browser-cli 帮我写一个 workflow，从 {{baseUrl}}/l2 获取前 10 条名言，最终返回 JSON 数组，每项只包含 text 和 author。写完后运行一次，把运行结果贴在回复里。"
    assert:
      - type: skill-used
        value: browser-cli

      - type: javascript
        value: file://./assertions.cjs:evaluateL2

  - description: "L3 — DOM only"
    vars:
      baseUrl: "{{ env.TEST_SKILL_FIXTURE_BASE_URL | default('http://127.0.0.1:4173') }}"
      prompt: "browser-cli 帮我写一个 workflow，从 {{baseUrl}}/l3 获取首页前 5 本书，最终返回 JSON 数组，每项只包含 title 和 price。写完后运行一次，把运行结果贴在回复里。"
    assert:
      - type: skill-used
        value: browser-cli

      - type: javascript
        value: file://./assertions.cjs:evaluateL3
